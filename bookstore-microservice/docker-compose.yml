version: "3.9"

services:
  customer-service:
    build: ./customer-service
    container_name: customer-service
    ports:
      - "8001:8000"
    volumes:
      - ./customer-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - INTERNAL_SERVICE_TOKEN=bookstore-internal-token
      - DJANGO_SECRET_KEY=customer-service-dev-key
    depends_on:
      - cart-service

  book-service:
    build: ./book-service
    container_name: book-service
    ports:
      - "8002:8000"
    volumes:
      - ./book-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - DJANGO_SECRET_KEY=book-service-dev-key

  cart-service:
    build: ./cart-service
    container_name: cart-service
    ports:
      - "8003:8000"
    volumes:
      - ./cart-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - INTERNAL_SERVICE_TOKEN=bookstore-internal-token
      - DJANGO_SECRET_KEY=cart-service-dev-key
    depends_on:
      - book-service

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    volumes:
      - ./api-gateway:/app
    environment:
      - DJANGO_SECRET_KEY=api-gateway-dev-key
    depends_on:
      - book-service
      - order-service
      - manager-service
      - comment-rate-service
      - recommender-ai-service

  staff-service:
    build: ./staff-service
    container_name: staff-service
    ports:
      - "8004:8000"
    volumes:
      - ./staff-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - DJANGO_SECRET_KEY=staff-service-dev-key

  manager-service:
    build: ./manager-service
    container_name: manager-service
    ports:
      - "8005:8000"
    volumes:
      - ./manager-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - DJANGO_SECRET_KEY=manager-service-dev-key
    depends_on:
      - staff-service
      - order-service
      - pay-service
      - ship-service
      - catalog-service
      - comment-rate-service

  catalog-service:
    build: ./catalog-service
    container_name: catalog-service
    ports:
      - "8006:8000"
    volumes:
      - ./catalog-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - DJANGO_SECRET_KEY=catalog-service-dev-key

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8007:8000"
    volumes:
      - ./order-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - INTERNAL_SERVICE_TOKEN=bookstore-internal-token
      - DJANGO_SECRET_KEY=order-service-dev-key
    depends_on:
      - pay-service
      - ship-service

  ship-service:
    build: ./ship-service
    container_name: ship-service
    ports:
      - "8008:8000"
    volumes:
      - ./ship-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - INTERNAL_SERVICE_TOKEN=bookstore-internal-token
      - DJANGO_SECRET_KEY=ship-service-dev-key

  pay-service:
    build: ./pay-service
    container_name: pay-service
    ports:
      - "8009:8000"
    volumes:
      - ./pay-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - INTERNAL_SERVICE_TOKEN=bookstore-internal-token
      - DJANGO_SECRET_KEY=pay-service-dev-key

  comment-rate-service:
    build: ./comment-rate-service
    container_name: comment-rate-service
    ports:
      - "8010:8000"
    volumes:
      - ./comment-rate-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - DJANGO_SECRET_KEY=comment-rate-service-dev-key

  recommender-ai-service:
    build: ./recommender-ai-service
    container_name: recommender-ai-service
    ports:
      - "8011:8000"
    volumes:
      - ./recommender-ai-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - DJANGO_SECRET_KEY=recommender-ai-service-dev-key
    depends_on:
      - comment-rate-service
      - book-service
