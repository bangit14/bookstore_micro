services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bookstore_mysql
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-mysql.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  customer-service:
    build: ./customer-service
    container_name: customer-service
    ports:
      - "8001:8000"
    volumes:
      - ./customer-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - INTERNAL_SERVICE_TOKEN=bookstore-internal-token
      - DJANGO_SECRET_KEY=customer-service-dev-key
      - DB_ENGINE=mysql
      - DB_NAME=customer_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_HOST=mysql-db
      - DB_PORT=3306
    depends_on:
      mysql-db:
        condition: service_healthy
      cart-service:
        condition: service_started

  book-service:
    build: ./book-service
    container_name: book-service
    ports:
      - "8002:8000"
    volumes:
      - ./book-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - DJANGO_SECRET_KEY=book-service-dev-key
      - DB_ENGINE=mysql
      - DB_NAME=book_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_HOST=mysql-db
      - DB_PORT=3306
    depends_on:
      mysql-db:
        condition: service_healthy

  cart-service:
    build: ./cart-service
    container_name: cart-service
    ports:
      - "8003:8000"
    volumes:
      - ./cart-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - INTERNAL_SERVICE_TOKEN=bookstore-internal-token
      - DJANGO_SECRET_KEY=cart-service-dev-key
      - DB_ENGINE=mysql
      - DB_NAME=cart_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_HOST=mysql-db
      - DB_PORT=3306
    depends_on:
      mysql-db:
        condition: service_healthy
      book-service:
        condition: service_started

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    volumes:
      - ./api-gateway:/app
    environment:
      - DJANGO_SECRET_KEY=api-gateway-dev-key
    depends_on:
      - book-service
      - order-service
      - manager-service
      - comment-rate-service
      - recommender-ai-service

  staff-service:
    build: ./staff-service
    container_name: staff-service
    ports:
      - "8004:8000"
    volumes:
      - ./staff-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - DJANGO_SECRET_KEY=staff-service-dev-key
      - DB_ENGINE=mysql
      - DB_NAME=staff_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_HOST=mysql-db
      - DB_PORT=3306
    depends_on:
      mysql-db:
        condition: service_healthy

  manager-service:
    build: ./manager-service
    container_name: manager-service
    ports:
      - "8005:8000"
    volumes:
      - ./manager-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - DJANGO_SECRET_KEY=manager-service-dev-key
      - DB_ENGINE=mysql
      - DB_NAME=manager_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_HOST=mysql-db
      - DB_PORT=3306
    depends_on:
      mysql-db:
        condition: service_healthy
      staff-service:
        condition: service_started
      order-service:
        condition: service_started
      pay-service:
        condition: service_started
      ship-service:
        condition: service_started
      catalog-service:
        condition: service_started
      comment-rate-service:
        condition: service_started

  catalog-service:
    build: ./catalog-service
    container_name: catalog-service
    ports:
      - "8006:8000"
    volumes:
      - ./catalog-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - DJANGO_SECRET_KEY=catalog-service-dev-key
      - DB_ENGINE=mysql
      - DB_NAME=catalog_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_HOST=mysql-db
      - DB_PORT=3306
    depends_on:
      mysql-db:
        condition: service_healthy

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8007:8000"
    volumes:
      - ./order-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - INTERNAL_SERVICE_TOKEN=bookstore-internal-token
      - DJANGO_SECRET_KEY=order-service-dev-key
      - DB_ENGINE=mysql
      - DB_NAME=order_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_HOST=mysql-db
      - DB_PORT=3306
    depends_on:
      mysql-db:
        condition: service_healthy
      pay-service:
        condition: service_started
      ship-service:
        condition: service_started

  ship-service:
    build: ./ship-service
    container_name: ship-service
    ports:
      - "8008:8000"
    volumes:
      - ./ship-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - INTERNAL_SERVICE_TOKEN=bookstore-internal-token
      - DJANGO_SECRET_KEY=ship-service-dev-key
      - DB_ENGINE=mysql
      - DB_NAME=ship_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_HOST=mysql-db
      - DB_PORT=3306
    depends_on:
      mysql-db:
        condition: service_healthy

  pay-service:
    build: ./pay-service
    container_name: pay-service
    ports:
      - "8009:8000"
    volumes:
      - ./pay-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - INTERNAL_SERVICE_TOKEN=bookstore-internal-token
      - DJANGO_SECRET_KEY=pay-service-dev-key
      - DB_ENGINE=mysql
      - DB_NAME=pay_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_HOST=mysql-db
      - DB_PORT=3306
    depends_on:
      mysql-db:
        condition: service_healthy

  comment-rate-service:
    build: ./comment-rate-service
    container_name: comment-rate-service
    ports:
      - "8010:8000"
    volumes:
      - ./comment-rate-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - DJANGO_SECRET_KEY=comment-rate-service-dev-key
      - DB_ENGINE=mysql
      - DB_NAME=comment_rate_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_HOST=mysql-db
      - DB_PORT=3306
    depends_on:
      mysql-db:
        condition: service_healthy

  recommender-ai-service:
    build: ./recommender-ai-service
    container_name: recommender-ai-service
    ports:
      - "8011:8000"
    volumes:
      - ./recommender-ai-service:/app
    environment:
      - JWT_SIGNING_KEY=bookstore-shared-jwt-secret
      - DJANGO_SECRET_KEY=recommender-ai-service-dev-key
      - DB_ENGINE=mysql
      - DB_NAME=recommender_ai_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_HOST=mysql-db
      - DB_PORT=3306
    depends_on:
      mysql-db:
        condition: service_healthy
      comment-rate-service:
        condition: service_started
      book-service:
        condition: service_started

volumes:
  mysql-data:
