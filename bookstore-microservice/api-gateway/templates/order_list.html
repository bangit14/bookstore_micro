{% extends "base.html" %} {% block content %}
<section>
  <article class="card">
    <div
      style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      "
    >
      <h2>Danh Sách Đơn Hàng</h2>
      <a
        href="{% url 'order_create' %}"
        class="btn-primary"
        style="
          text-decoration: none;
          padding: 0.5rem 1rem;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: white;
          border-radius: 8px;
        "
        >+ Tạo Đơn Hàng</a
      >
    </div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Khách hàng</th>
          <th>Trạng thái</th>
          <th>Tổng tiền</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody>
        {% for o in orders %}
        <tr>
          <td>{{ o.id }}</td>
          <td>{{ o.customer_id }}</td>
          <td>{{ o.status }}</td>
          <td>${{ o.total_amount }}</td>
          <td><a href="{% url 'order_detail' o.id %}">Xem Chi Tiết</a></td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="5">Không tìm thấy đơn hàng nào.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </article>
</section>
{% endblock %}
